<!DOCTYPE html>
<html>
<head>
    <title>Age Input Example</title>
    <script>
        function askAge() {
            let age = prompt("Please enter your age:");
            if (age) {
                document.getElementById("result").innerText = "You are " + age + " years old.";
            }
        }
    </script>
</head>
<body>
    <h1>Welcome!</h1>
    <p>Click the button below to enter your age:</p>
    
    <!-- Button to trigger age prompt -->
    <button onclick="askAge()">Enter Age</button>
    
    <!-- Display result -->
    <p id="result"></p>
</body>
</html>
